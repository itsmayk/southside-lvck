<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>South Side · Selector (prototipo)</title>
<meta name="robots" content="noindex">

<!-- no-flash theme bootstrap: same ss-theme key as the shop -->
<script>
  (function () {
    try {
      var t = localStorage.getItem("ss-theme");
      if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Playfair+Display:wght@400..700&display=swap" rel="stylesheet">

<style>
  /* ------- brand tokens (mirror of shop.css, trimmed to what the prototype needs) ------- */
  :root {
    --bone: #F5F5F0;
    --bone-deep: #EBEBE4;
    --ink: #0A0A0A;
    --muted: #6B6B66;
    --hairline: #D6D6CD;
    --pearl: #4F4F49;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    --ease-loop: cubic-bezier(0.37, 0, 0.63, 1);
    --contact: rgba(10, 10, 10, 0.18);
  }
  :root[data-theme="dark"] {
    --bone: #232320;
    --bone-deep: #2C2C28;
    --ink: #F0F0EA;
    --muted: #A2A29A;
    --hairline: #3E3E38;
    --pearl: #C4C4BA;
    --contact: rgba(0, 0, 0, 0.5);
  }

  @font-face {
    font-family: 'AngerStyles';
    src: url('fonts/AngerStyles.ttf') format('truetype');
    font-display: swap;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  html { color-scheme: light dark; height: 100%; }
  /* Locked one-screen "app": the whole thing fits the viewport and neither
     scrolls nor zooms, so dragging a garment never drags the page. */
  body {
    background: var(--bone);
    color: var(--ink);
    font-family: 'Playfair Display', Georgia, serif;
    height: 100vh;
    height: 100dvh;            /* tracks the mobile URL bar */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    overscroll-behavior: none; /* no rubber-band */
    touch-action: manipulation;/* kill double-tap zoom */
    -webkit-tap-highlight-color: transparent;
    transition: background 0.4s var(--ease), color 0.4s var(--ease);
  }
  img { display: block; max-width: 100%; }

  /* ---- title, same chrome family as the shop ---- */
  .head {
    text-align: center;
    padding: clamp(16px, 4vh, 40px) 20px 4px;
    flex: 0 0 auto;
  }
  .head .eyebrow {
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .chrome {
    margin: 0;
    font-family: 'AngerStyles', 'Cinzel', serif;
    font-weight: 400;
    font-size: clamp(34px, 8vw, 74px);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1.2;
    background: linear-gradient(180deg,
      #3E3E3C 6%, #101010 28%, #9A9A94 47%,
      #14141A 56%, #6C6C66 76%, #23232A 94%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.85)) drop-shadow(0 6px 18px rgba(10,10,10,0.22));
  }
  :root[data-theme="dark"] .chrome {
    background: linear-gradient(180deg,
      #FFFFFF 0%, #E8E8EC 28%, #8E9096 48%,
      #F4F5F7 55%, #6E7076 78%, #23232A 96%);
    -webkit-background-clip: text; background-clip: text;
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.12)) drop-shadow(0 8px 22px rgba(0,0,0,0.5));
  }

  /* ================= the character selector ================= */
  .selector {
    position: relative;
    flex: 1 1 auto;   /* eats whatever height the fixed rows leave */
    min-height: 0;
    margin-top: 6px;
    /* the drag is ours — stop the browser panning/zooming on the rack */
    touch-action: none;
    /* the whole rack fades up from below on entry */
    perspective: 1400px;
  }

  .rail {
    position: absolute; inset: 0;
    /* nothing here transforms — items position against this box */
  }

  /* LAYER 1 — entrance. Owns translateY + opacity ONLY. Rises from below. */
  .slot {
    position: absolute;
    top: 0; left: 50%;
    width: min(46vw, 360px);
    height: 100%;
    opacity: 0;
    translate: 0 70px;
    transition: opacity 0.7s var(--ease), translate 0.7s var(--ease);
    /* keep the slot centred; the offset is applied by LAYER 2 */
    margin-left: calc(min(46vw, 360px) / -2);
    will-change: opacity, translate;
  }
  .selector.in .slot { opacity: 1; translate: 0 0; }

  /* LAYER 2 — coverflow. Owns transform (translateX + scale) ONLY, set by JS. */
  .item {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    transform-origin: center bottom;
    transition: transform 0.55s var(--ease), opacity 0.55s var(--ease), filter 0.55s var(--ease);
    cursor: pointer;
    will-change: transform, opacity, filter;
  }
  .item.center { cursor: default; }

  /* LAYER 3 — the garment itself. Owns its own float loop (translate), so it
     never fights the coverflow transform on its parent. */
  .obj {
    position: relative;
    height: 100%;
    display: flex; align-items: flex-end; justify-content: center;
  }
  .obj img {
    height: 100%;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    /* soft edge feather — fakes a cutout while the real PNGs aren't in yet.
       With transparent PNGs it just adds a gentle vignette, no harm. */
    -webkit-mask: radial-gradient(120% 92% at 50% 42%, #000 62%, transparent 100%);
            mask: radial-gradient(120% 92% at 50% 42%, #000 62%, transparent 100%);
    filter: drop-shadow(0 24px 28px var(--contact));
  }
  /* the centred garment floats; the neighbours stay put */
  .item.center .obj {
    animation: bob 3.6s var(--ease-loop) infinite;
  }
  @keyframes bob {
    0%, 100% { translate: 0 0; }
    50%      { translate: 0 -14px; }
  }

  /* contact shadow ellipse on the ground, sells "floating above the floor" */
  .item::after {
    content: "";
    position: absolute;
    bottom: 2%;
    width: 46%; height: 22px;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, var(--contact) 0%, transparent 72%);
    opacity: 0;
    transition: opacity 0.55s var(--ease);
  }
  .item.center::after { opacity: 1; animation: shadowPulse 3.6s var(--ease-loop) infinite; }
  @keyframes shadowPulse {
    0%, 100% { transform: scaleX(1);    opacity: 1; }
    50%      { transform: scaleX(0.82); opacity: 0.7; }
  }

  /* ---- readout: name + price under the rack, cross-fades on change ---- */
  .readout {
    text-align: center;
    padding: 6px 20px 4px;
    min-height: 64px;
    flex: 0 0 auto;
  }
  .readout .name {
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: clamp(16px, 3.4vw, 22px);
    margin: 0;
    transition: opacity 0.25s var(--ease);
  }
  .readout .price {
    color: var(--muted);
    font-size: 15px;
    margin-top: 6px;
    transition: opacity 0.25s var(--ease);
  }
  .readout.swap .name, .readout.swap .price { opacity: 0; }

  /* ---- arrows: subtle, chrome, invite the slide ---- */
  .arrow {
    position: absolute; top: 50%;
    width: 54px; height: 54px;
    margin-top: -27px;
    display: grid; place-items: center;
    border: 1px solid var(--hairline);
    border-radius: 50%;
    background: color-mix(in srgb, var(--bone) 70%, transparent);
    backdrop-filter: blur(6px);
    color: var(--muted);
    cursor: pointer;
    z-index: 20;
    opacity: 0.55;
    transition: opacity 0.3s var(--ease), transform 0.3s var(--ease), color 0.3s var(--ease);
    animation: nudge 2.6s var(--ease-loop) infinite;
  }
  .arrow:hover { opacity: 1; color: var(--ink); transform: scale(1.08); }
  .arrow.left  { left: clamp(8px, 4vw, 48px); }
  .arrow.right { right: clamp(8px, 4vw, 48px); }
  .arrow svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
  @keyframes nudge {
    0%, 100% { }
    50% { }
  }
  .arrow.left  { animation-name: nudgeL; }
  .arrow.right { animation-name: nudgeR; }
  @keyframes nudgeL { 0%,100%{ transform: translateX(0);} 50%{ transform: translateX(-5px);} }
  @keyframes nudgeR { 0%,100%{ transform: translateX(0);} 50%{ transform: translateX(5px);} }

  /* ---- dots ---- */
  .dots { display: flex; gap: 9px; justify-content: center; margin-top: 2px; }
  .dots i {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--hairline);
    transition: background 0.3s var(--ease), transform 0.3s var(--ease);
  }
  .dots i.on { background: var(--pearl); transform: scale(1.35); }

  /* ---- "desliza" cue ---- */
  .cue {
    text-align: center;
    margin-top: 14px;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 10px;
    opacity: 0.8;
  }

  .foot {
    text-align: center; color: var(--muted);
    font-size: 12px; letter-spacing: 0.06em;
    padding: 14px 20px clamp(14px, 3vh, 30px);
    flex: 0 0 auto;
  }
  .dots, .cue { flex: 0 0 auto; }

  /* ---- theme switch, bottom-right (same as the shop) ---- */
  .theme-switch {
    position: fixed; right: 20px; bottom: 20px; z-index: 60;
    width: 46px; height: 46px; border-radius: 50%;
    border: 1px solid var(--hairline);
    background: var(--bone-deep);
    color: var(--ink);
    display: grid; place-items: center;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(10,10,10,0.14);
  }
  .theme-switch svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.7; }
  .theme-switch .i-moon { display: none; }
  :root[data-theme="dark"] .theme-switch .i-sun { display: none; }
  :root[data-theme="dark"] .theme-switch .i-moon { display: block; }

  .proto-tag {
    position: fixed; left: 14px; top: 14px; z-index: 60;
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--hairline); border-radius: 999px;
    padding: 5px 11px; background: color-mix(in srgb, var(--bone) 70%, transparent);
  }

  @media (prefers-reduced-motion: reduce) {
    .item.center .obj, .item.center::after, .arrow { animation: none !important; }
    .selector.in .slot { transition: none; }
  }

  @media (max-width: 560px) {
    .arrow { width: 44px; height: 44px; margin-top: -22px; }
    .arrow.left  { left: 6px; }
    .arrow.right { right: 6px; }
    .slot { width: min(48vw, 300px); margin-left: calc(min(48vw, 300px) / -2); }
    .foot { display: none; }   /* one screen, no room to spare */
  }
</style>
</head>
<body>

<div class="proto-tag">Prototipo · selector</div>

<header class="head">
  <div class="eyebrow">Lanzamiento</div>
  <h1 class="chrome">South Side</h1>
</header>

<section class="selector" id="selector" aria-roledescription="carrusel de prendas">
  <div class="rail" id="rail"></div>

  <button class="arrow left" id="prev" aria-label="Prenda anterior">
    <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="arrow right" id="next" aria-label="Prenda siguiente">
    <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</section>

<div class="readout" id="readout">
  <h2 class="name" id="rd-name">—</h2>
  <div class="price" id="rd-price">—</div>
</div>

<div class="dots" id="dots"></div>
<div class="cue">Desliza</div>

<footer class="foot">LVCK · South Side — prototipo, imágenes provisionales</footer>

<button type="button" class="theme-switch" id="themeBtn" aria-label="Cambiar tema" title="Cambiar tema">
  <svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="12" r="4.2"/>
    <path d="M12 2.4v2.6M12 19v2.6M4.4 12H1.8M22.2 12h-2.6M6.4 6.4 4.6 4.6M19.4 19.4l-1.8-1.8M17.6 6.4l1.8-1.8M4.6 19.4l1.8-1.8" stroke-linecap="round"/>
  </svg>
  <svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M20.5 14.6A8.6 8.6 0 0 1 9.4 3.5a8.6 8.6 0 1 0 11.1 11.1Z" stroke-linejoin="round"/>
  </svg>
</button>

<script>
(function () {
  "use strict";

  // 4 garments — chaqueta, jean, chaqueta, jean. Two are placeholders reusing
  // the existing photos until the real transparent cutouts come in.
  var GARMENTS = [
    { name: "LVCK Boxi Fit", price: 300000, img: "photos/boxi-fit-01.jpg" },
    { name: "Jean LXC",      price: 269000, img: "photos/jean-lxc-01.jpg" },
    { name: "Boxi Fit · II", price: 300000, img: "photos/boxi-fit-03.jpg" },
    { name: "Jean LXC · II", price: 269000, img: "photos/jean-lxc-02.jpg" }
  ];

  function money(v) {
    return "$" + v.toLocaleString("es-CO");
  }

  var rail = document.getElementById("rail");
  var dotsWrap = document.getElementById("dots");
  var rdName = document.getElementById("rd-name");
  var rdPrice = document.getElementById("rd-price");
  var readout = document.getElementById("readout");
  var selector = document.getElementById("selector");

  var current = 0;
  var N = GARMENTS.length;
  var items = [];

  // build slots
  GARMENTS.forEach(function (g, i) {
    var slot = document.createElement("div");
    slot.className = "slot";
    slot.style.transitionDelay = (0.06 * i) + "s";   // staggered rise

    var item = document.createElement("div");
    item.className = "item";
    item.addEventListener("click", function () { select(i); });

    var obj = document.createElement("div");
    obj.className = "obj";
    var img = document.createElement("img");
    img.src = g.img;
    img.alt = g.name;
    img.draggable = false;
    obj.appendChild(img);
    item.appendChild(obj);

    slot.appendChild(item);
    rail.appendChild(slot);
    items.push(item);

    var d = document.createElement("i");
    d.addEventListener("click", function () { select(i); });
    dotsWrap.appendChild(d);
  });
  var dots = Array.prototype.slice.call(dotsWrap.querySelectorAll("i"));

  // shortest signed distance around the ring, so sliding always takes the
  // near way round (character-select wraps endlessly)
  function ringOffset(i, c) {
    var d = i - c;
    if (d > N / 2) d -= N;
    if (d < -N / 2) d += N;
    return d;
  }

  function layout() {
    // Narrow phones have no room for the center piece AND two full neighbours,
    // so the neighbours must sit closer and peek from behind. Wide screens can
    // spread them out. Offsets are in vw so they track the viewport.
    var narrow = window.innerWidth <= 560;
    var nearT = narrow ? 39 : 30;   // how far the side pieces sit from center
    var farT  = narrow ? 62 : 52;   // where the hidden ones park
    var nearS = narrow ? 0.62 : 0.6;
    var nearO = narrow ? 0.58 : 0.5;
    var nearB = narrow ? 4 : 5;

    items.forEach(function (item, i) {
      var off = ringOffset(i, current);
      var abs = Math.abs(off);
      var t, scale, opacity, blur, z;

      if (off === 0) {
        t = 0; scale = 1; opacity = 1; blur = 0; z = 30;
      } else if (abs === 1) {
        t = off * nearT; scale = nearS; opacity = nearO; blur = nearB; z = 20;
      } else {
        // parked further out and invisible; still on its side for a smooth exit
        t = (off > 0 ? 1 : -1) * farT; scale = 0.42; opacity = 0; blur = 8; z = 10;
      }

      item.style.transform = "translateX(" + t + "vw) scale(" + scale + ")";
      item.style.opacity = opacity;
      item.style.filter = blur ? "blur(" + blur + "px)" : "none";
      item.style.zIndex = z;
      item.classList.toggle("center", off === 0);
      // only the centred, focused garment is a real click target for buying
      item.style.pointerEvents = abs <= 1 ? "auto" : "none";
    });

    dots.forEach(function (d, i) { d.classList.toggle("on", i === current); });

    // cross-fade the readout text
    readout.classList.add("swap");
    setTimeout(function () {
      rdName.textContent = GARMENTS[current].name;
      rdPrice.textContent = money(GARMENTS[current].price);
      readout.classList.remove("swap");
    }, 180);
  }

  function select(i) {
    current = ((i % N) + N) % N;
    layout();
  }
  function step(dir) { select(current + dir); }

  document.getElementById("prev").addEventListener("click", function () { step(-1); });
  document.getElementById("next").addEventListener("click", function () { step(1); });

  // recompute spacing when the width/orientation changes (phone rotate, URL bar)
  var reflow;
  window.addEventListener("resize", function () {
    clearTimeout(reflow);
    reflow = setTimeout(layout, 120);
  });

  // keyboard
  window.addEventListener("keydown", function (e) {
    if (e.key === "ArrowLeft") step(-1);
    else if (e.key === "ArrowRight") step(1);
  });

  // wheel (horizontal or vertical), throttled
  var wheelLock = false;
  selector.addEventListener("wheel", function (e) {
    var d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    if (Math.abs(d) < 8 || wheelLock) return;
    e.preventDefault();
    wheelLock = true;
    step(d > 0 ? 1 : -1);
    setTimeout(function () { wheelLock = false; }, 380);
  }, { passive: false });

  // drag / swipe
  var startX = null, moved = false;
  function down(x) { startX = x; moved = false; }
  function move(x) {
    if (startX === null) return;
    if (Math.abs(x - startX) > 46 && !moved) {
      moved = true;
      step(x < startX ? 1 : -1);
    }
  }
  function up() { startX = null; }

  selector.addEventListener("pointerdown", function (e) { down(e.clientX); });
  selector.addEventListener("pointermove", function (e) { if (startX !== null) move(e.clientX); });
  window.addEventListener("pointerup", up);
  selector.addEventListener("touchstart", function (e) { down(e.touches[0].clientX); }, { passive: true });
  selector.addEventListener("touchmove", function (e) { move(e.touches[0].clientX); }, { passive: true });
  selector.addEventListener("touchend", up);

  // initial paint + entrance
  layout();
  requestAnimationFrame(function () {
    requestAnimationFrame(function () { selector.classList.add("in"); });
  });

  // hard-lock the viewport on mobile: iOS Safari ignores user-scalable=no, so
  // block pinch (gesture* / 2-finger touchmove) and double-tap zoom by hand.
  document.addEventListener("gesturestart", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturechange", function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener("touchmove", function (e) {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  var lastTap = 0;
  document.addEventListener("touchend", function (e) {
    var now = Date.now();
    if (now - lastTap < 320) e.preventDefault();  // double-tap
    lastTap = now;
  }, { passive: false });

  // theme toggle
  document.getElementById("themeBtn").addEventListener("click", function () {
    var root = document.documentElement;
    var next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("ss-theme", next); } catch (e) {}
  });
})();
</script>
</body>
</html>
