  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"7caca77d-286e-4b23-8a08-0003ba910eba\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <meta charset=\"utf-8\">\n  <title>SouthSide — LVCK<\u002Ftitle>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n  <link href=\"https://fonts.googleapis.com/css2?family=Archivo+Black&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&family=Pirata+One&family=Cinzel:wght@400..900&display=swap\" rel=\"stylesheet\">\n  \n  <style>\n    html, body { margin: 0; padding: 0; }\n    body { overscroll-behavior: none; }\n    @keyframes chevronDrift {\n      0%, 100% { transform: translateY(0); opacity: 0.9; }\n      50% { transform: translateY(10px); opacity: 0.4; }\n    }\n    @keyframes slowBreathe {\n      0%, 100% { filter: drop-shadow(0 0 24px rgba(255,255,255,0.10)); }\n      50% { filter: drop-shadow(0 0 60px rgba(255,255,255,0.28)); }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ rootRef }}\" style=\"height: 440vh; background: {{ bg }}; position: relative;\">\n\n  <div data-export=\"viewport\" style=\"position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden; background: {{ bg }};\">\n\n    <!-- halo behind logos -->\n    <div ref=\"{{ haloRef }}\" style=\"grid-area: 1 / 1; width: 90vmin; height: 90vmin; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.0) 62%); opacity: 0;\"><\u002Fdiv>\n\n    <!-- logo stack -->\n    <div ref=\"{{ stageRef }}\" style=\"grid-area: 1 / 1; display: grid; place-items: center; will-change: transform;\">\n      <img src=\"2f227dc3-5895-447d-ab58-cfd6d3bc306d\" alt=\"\" ref=\"{{ oldRef }}\" style=\"grid-area: 1 / 1; width: min(43vw, 77vh); will-change: transform, opacity, filter;\">\n      <img src=\"31437c1b-95cc-438a-b01b-6e198a42c2c3\" alt=\"\" ref=\"{{ newRef }}\" style=\"grid-area: 1 / 1; width: min(46vw, 83vh); opacity: 0; will-change: transform, opacity, filter;\">\n    <\u002Fdiv>\n\n    <!-- register space -->\n    <div ref=\"{{ regRef }}\" style=\"position: absolute; left: 50%; bottom: 6vh; transform: translateX(-50%) translateY(40px); opacity: 0; display: flex; flex-direction: column; align-items: center; gap: 28px; pointer-events: none;\">\n      <div style=\"font-family: 'Cinzel', serif; font-weight: 700; font-size: clamp(30px, 6vw, 48px); letter-spacing: 0.06em; text-transform: uppercase; color: #FFFFFF;\">SouthSide<\u002Fdiv>\n      <div style=\"font-family: 'Times New Roman', Times, serif; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.6);\">15 AUG 2026<\u002Fdiv>\n      <div style=\"font-family: 'Saira Stencil', sans-serif; font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.55); max-width: 420px; text-align: center;\">After a period of silence, LVCK returns with SouthSide — the drop that marks our new chapter.<\u002Fdiv>\n      <div style=\"font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.55); padding-left: 0.5em;\">Register<\u002Fdiv>\n      <form sc-camel-on-submit=\"{{ onRegister }}\" style=\"display: flex; gap: 0; align-items: stretch;\">\n        <input type=\"email\" required=\"\" placeholder=\"your@email.com\" style=\"width: min(52vw, 340px); background: transparent; border: 1px solid rgba(255,255,255,0.35); border-right: none; color: #FFFFFF; font-family: 'Playfair Display', serif; font-size: 16px; padding: 16px 20px; outline: none; border-radius: 0;\">\n        <button type=\"submit\" style-hover=\"background: rgba(255,255,255,0.9); color: #0A0A0A;\" style=\"background: transparent; border: 1px solid rgba(255,255,255,0.35); color: #FFFFFF; font-size: 20px; padding: 0 24px; cursor: pointer; transition: background 0.3s, color 0.3s; border-radius: 0;\">→<\u002Fbutton>\n      <\u002Fform>\n      <sc-if value=\"{{ registered }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.8); padding-left: 0.3em;\">Welcome<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display: flex; gap: 22px; font-family: 'Playfair Display', serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;\">\n        <a href=\"#\" style=\"color: rgba(255,255,255,0.5); text-decoration: none;\">Instagram<\u002Fa>\n        <a href=\"#\" style=\"color: rgba(255,255,255,0.5); text-decoration: none;\">X<\u002Fa>\n        <a href=\"#\" style=\"color: rgba(255,255,255,0.5); text-decoration: none;\">YouTube<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- scroll chevron -->\n    <div ref=\"{{ chevronRef }}\" style=\"position: absolute; bottom: 42px; left: 50%; margin-left: -14px; animation: chevronDrift 2.2s ease-in-out infinite;\">\n      <div style=\"width: 22px; height: 22px; border-right: 2px solid rgba(255,255,255,0.75); border-bottom: 2px solid rgba(255,255,255,0.75); transform: rotate(45deg);\"><\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;bg&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#0A0A0A&quot;, &quot;options&quot;: [&quot;#0A0A0A&quot;, &quot;#120D09&quot;, &quot;#0B0E15&quot;, &quot;#14060A&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Look&quot;}, &quot;parallax&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;haloStrength&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 1, &quot;min&quot;: 0, &quot;max&quot;: 2, &quot;step&quot;: 0.1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Look&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.rootRef = React.createRef();\n    this.stageRef = React.createRef();\n    this.oldRef = React.createRef();\n    this.newRef = React.createRef();\n    this.haloRef = React.createRef();\n    this.chevronRef = React.createRef();\n    this.regRef = React.createRef();\n    this.state = { registered: false };\n    this.mx = 0; this.my = 0;      // smoothed mouse\n    this.tmx = 0; this.tmy = 0;    // target mouse\n    this.sp = 0;                   // smoothed scroll progress\n    this.raf = null;\n  }\n\n  componentDidMount() {\n    this.onMove = (e) => {\n      this.tmx = (e.clientX / window.innerWidth - 0.5) * 2;\n      this.tmy = (e.clientY / window.innerHeight - 0.5) * 2;\n    };\n    window.addEventListener('mousemove', this.onMove);\n    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));\n    const ease = (t) => t * t * (3 - 2 * t); // smoothstep\n    const seg = (p, a, b) => ease(clamp((p - a) / (b - a), 0, 1));\n\n    const tick = () => {\n      this.raf = requestAnimationFrame(tick);\n      const doc = document.documentElement;\n      const max = Math.max(1, doc.scrollHeight - window.innerHeight);\n      const target = clamp(window.scrollY / max, 0, 1);\n      this.sp += (target - this.sp) * 0.045;   // smoothed scroll follow\n      const p = this.sp;\n\n      // smooth mouse\n      this.mx += (this.tmx - this.mx) * 0.12;\n      this.my += (this.tmy - this.my) * 0.12;\n\n      const oldEl = this.oldRef.current, newEl = this.newRef.current;\n      const stage = this.stageRef.current, halo = this.haloRef.current;\n      const chev = this.chevronRef.current;\n      if (!oldEl || !newEl || !stage) return;\n\n      // Act 1 (0 → .35): old logo holds, slowly grows\n      // Act 2 (.25 → .62): crossfade old → new, slight rotation energy\n      // Act 3 (.50 → .75): new logo settles, breathes, halo blooms\n      // Act 4 (.78 → 1): register space rises, logo drifts up\n      const fadeOut = seg(p, 0.20, 0.46);\n      const fadeIn  = seg(p, 0.24, 0.53);\n      const settle  = seg(p, 0.50, 0.75);\n      const reg     = seg(p, 0.78, 0.96);\n\n      // grow to full screen, then zoom-through as the new one emerges from its center\n      const grow = seg(p, 0, 0.24);\n      const oldScale = 1 + grow * 1.4 + fadeOut * 2.2;\n      oldEl.style.opacity = String(1 - seg(p, 0.30, 0.46));\n      oldEl.style.transform = 'scale(' + oldScale.toFixed(4) + ') translateY(' + (fadeOut * 12).toFixed(1) + 'vh)';\n      oldEl.style.filter = 'blur(' + (fadeOut * 22).toFixed(1) + 'px)';\n\n      const newScale = 0.42 + fadeIn * 0.34 + settle * 0.04;\n      newEl.style.opacity = String(fadeIn);\n      newEl.style.transform = 'scale(' + newScale.toFixed(4) + ') rotate(' + ((1 - fadeIn) * -10).toFixed(2) + 'deg)';\n      newEl.style.filter = fadeIn > 0.98 ? '' : 'blur(' + ((1 - fadeIn) * 14).toFixed(1) + 'px)';\n      newEl.style.animation = settle > 0.6 ? 'slowBreathe 5s ease-in-out infinite' : 'none';\n\n      // parallax on the whole stage + upward drift for the register act\n      const amp = (this.props.parallax ?? true) ? 36 : 0;\n      const lift = reg * (window.innerHeight * 0.32);\n      const regShrink = 1 - reg * 0.48;\n      stage.style.transform = 'translate(' + (this.mx * amp).toFixed(1) + 'px,' + (this.my * amp * 0.7 - lift).toFixed(1) + 'px) scale(' + regShrink.toFixed(4) + ')';\n\n      const regEl = this.regRef.current;\n      if (regEl) {\n        regEl.style.opacity = String(reg.toFixed(3));\n        regEl.style.transform = 'translateX(-50%) translateY(' + ((1 - reg) * 40).toFixed(1) + 'px)';\n        regEl.style.pointerEvents = reg > 0.5 ? 'auto' : 'none';\n      }\n\n      if (halo) halo.style.opacity = String((settle * (1 - reg * 0.5) * (this.props.haloStrength ?? 1)).toFixed(3));\n      if (chev) chev.style.opacity = String(1 - seg(p, 0, 0.08));\n    };\n    tick();\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this.raf);\n    window.removeEventListener('mousemove', this.onMove);\n  }\n\n  renderVals() {\n    return {\n      bg: this.props.bg ?? '#0A0A0A',\n      rootRef: this.rootRef,\n      stageRef: this.stageRef,\n      oldRef: this.oldRef,\n      newRef: this.newRef,\n      haloRef: this.haloRef,\n      chevronRef: this.chevronRef,\n      regRef: this.regRef,\n      registered: this.state.registered,\n      onRegister: (e) => { e.preventDefault(); this.setState({ registered: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
