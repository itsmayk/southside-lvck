<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gracias — SouthSide x LVCK</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="favicon.png?v=3">
<link rel="apple-touch-icon" href="favicon.png?v=3">
<script>
  (function () {
    if (location.hostname.indexOf("github.io") === -1) return;
    var rest = location.pathname.replace(/^\/[^/]+/, "") || "/";
    location.replace("https://southside-lvck.vercel.app" + rest + location.search + location.hash);
  })();
</script>
<meta name="theme-color" content="#F5F5F0">
<script>
  /* Runs before the stylesheet so the page never paints the wrong mode first.
     A stored choice wins; otherwise follow the device. */
  (function () {
    try {
      var t = localStorage.getItem("ss-theme");
      if (t !== "light" && t !== "dark") {
        t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
      var m = document.querySelector('meta[name="theme-color"]');
      if (m) m.setAttribute("content", t === "dark" ? "#232320" : "#F5F5F0");
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shop.css">
<script defer src="/_vercel/insights/script.js"></script>
<style>
  .thanks {
    max-width: 640px;
    margin: 0 auto;
    padding: clamp(60px, 16vh, 150px) clamp(20px, 5vw, 40px) 0;
    text-align: center;
  }
  .thanks .eyebrow { margin-bottom: 20px; }
  .thanks h1 {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: clamp(40px, 9vw, 78px);
    letter-spacing: 0.05em;
  }
  .thanks .sub {
    margin-top: 22px;
    font-size: clamp(15px, 1.8vw, 18px);
    line-height: 1.65;
    color: var(--muted);
  }

  .arch {
    width: clamp(70px, 14vw, 104px);
    margin: 0 auto clamp(28px, 5vh, 48px);
    filter: invert(var(--logo-invert));
    animation: rise 1.4s var(--ease) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: none; }
  }

  .next {
    margin: clamp(44px, 8vh, 76px) auto 0;
    text-align: left;
    border-top: 1px solid var(--hairline);
  }
  .next h2 {
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 26px 0 18px;
  }
  .next ol { list-style: none; counter-reset: step; }
  .next li {
    counter-increment: step;
    display: grid;
    grid-template-columns: 30px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--hairline);
    font-size: 15px;
    line-height: 1.6;
  }
  .next li::before {
    content: counter(step, decimal-leading-zero);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    padding-top: 4px;
  }

  .thanks .btn { margin-top: clamp(34px, 6vh, 56px); }
</style>
</head>
<body>

<div class="topbar">
  <header class="site-head">
    <a class="mark" href="shop.html" aria-label="LVCK">
      <img src="logo-w.png" alt="LVCK">
    </a>
    <nav class="head-links">
      <button type="button" data-open-lang data-i18n="nav.lang">Idioma</button>
    </nav>
  </header>
  <div class="countdown-bar">
    <span class="label" data-i18n="drop.label">Lanzamiento</span>
    <span class="clock"></span>
    <span class="date" data-i18n="drop.date">15 AGO 2026</span>
  </div>
</div>

<main class="thanks">
  <img class="arch" src="logo-w.png" alt="">
  <div class="eyebrow" data-i18n="ty.eyebrow">Pedido confirmado</div>
  <h1 data-i18n="ty.title">Gracias</h1>
  <p class="sub" data-i18n="ty.sub">Tu pedido entró.</p>

  <section class="next">
    <h2 data-i18n="ty.next">Qué sigue</h2>
    <ol>
      <li data-i18n="ty.n1">Revisa tu correo.</li>
      <li data-i18n="ty.n2">Preparamos tu pedido.</li>
      <li data-i18n="ty.n3">¿Algo no cuadra? Escríbenos.</li>
    </ol>
  </section>

  <a class="btn" href="shop.html"><span class="lbl" data-i18n="btn.back">Volver</span></a>
</main>

<footer class="site-foot">
  <div data-i18n="foot.brand">LVCK · South Side</div>
  <div data-i18n="foot.note">Bogotá, Colombia</div>
</footer>

<button type="button" class="theme-switch" id="ss-theme-btn" data-toggle-theme
        aria-label="Cambiar a modo oscuro" title="Cambiar a modo oscuro">
  <svg class="i-sun" viewBox="0 0 24 24" aria-hidden="true">
    <circle cx="12" cy="12" r="4.2"/>
    <path d="M12 2.4v2.6M12 19v2.6M4.4 12H1.8M22.2 12h-2.6M6.4 6.4 4.6 4.6M19.4 19.4l-1.8-1.8M17.6 6.4l1.8-1.8M4.6 19.4l1.8-1.8"/>
  </svg>
  <svg class="i-moon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M20.5 14.6A8.6 8.6 0 0 1 9.4 3.5a8.6 8.6 0 1 0 11.1 11.1Z"/>
  </svg>
</button>

<script src="shop-common.js"></script>
<script>
  /* Reached only after Stripe redirects here, so there is nothing to fetch and
     nothing to get wrong — the one job is to reassure. Stripe appends its own
     session id when configured to; we deliberately don't read or display it. */
  LVCK.boot();
</script>
</body>
</html>
